<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>New Store — 1 March 2026</title>
    <meta
      name="description"
      content="We are scaling, building and shipping hard. New store on 1 March 2026."
    />
    <style>
      :root {
        color-scheme: dark;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        background: radial-gradient(1200px 800px at 50% 35%, rgba(255,255,255,0.08), rgba(0,0,0,0.2)),
                    linear-gradient(180deg, #07080b, #040507);
        color: rgba(255,255,255,0.92);
      }
      .wrap {
        width: min(920px, 92vw);
        padding: 56px 24px;
      }
      .card {
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 24px;
        padding: 40px 28px;
        background: rgba(255,255,255,0.04);
        box-shadow: 0 30px 80px rgba(0,0,0,0.55);
        backdrop-filter: blur(10px);
      }
      h1 {
        margin: 0 0 12px;
        font-size: clamp(28px, 4.2vw, 52px);
        line-height: 1.05;
        letter-spacing: -0.02em;
      }
      p {
        margin: 0;
        font-size: clamp(16px, 1.6vw, 20px);
        line-height: 1.6;
        color: rgba(255,255,255,0.78);
      }
      .date {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        margin-top: 22px;
        padding: 10px 14px;
        border-radius: 999px;
        border: 1px solid rgba(255,255,255,0.14);
        background: rgba(255,255,255,0.05);
        font-weight: 600;
        color: rgba(255,255,255,0.9);
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: rgba(255,255,255,0.85);
        box-shadow: 0 0 0 6px rgba(255,255,255,0.08);
      }
      footer {
        margin-top: 18px;
        font-size: 13px;
        color: rgba(255,255,255,0.45);
      }
    </style>
  </head>
  <body>
    <main class="wrap">
      <section class="card" role="region" aria-label="Announcement">
        <h1>We are scaling, building and shipping hard.</h1>
        <p>New store on <strong>1 March 2026</strong>.</p>

        <div class="date" aria-label="Launch date">
          <span class="dot" aria-hidden="true"></span>
          1 March 2026
        </div>

        <footer>© <span id="y"></span></footer>
      </section>
    </main>

    <script>
      document.getElementById("y").textContent = new Date().getFullYear();
    </script>
  </body>
</html>
